name: Refresh catalog
on:
  schedule:
    - cron: '0 7 * * *'   # ~1h after the source clones sync from upstream (06:00 UTC)
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'scripts/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate catalog from current sources
        run: python3 scripts/generate-catalog.py --clones-dir "$RUNNER_TEMP/clones"
      - name: Commit if the catalog changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/skills.json SKILLS.md
          if git diff --cached --quiet; then
            echo "No catalog changes."
          else
            git commit -m "chore: refresh skill catalog [skip ci]"
            git push
          fi
